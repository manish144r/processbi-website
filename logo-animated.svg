<svg viewBox="0 0 132 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Process BI logo">
  <defs>
    <linearGradient id="pbBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1A4AC2"/>
      <stop offset="1" stop-color="#2E6BF6"/>
    </linearGradient>
    <linearGradient id="pbBarTop" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2E6BF6"/>
      <stop offset="1" stop-color="#46D5FF"/>
    </linearGradient>
    <linearGradient id="pbLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2E6BF6"/>
      <stop offset="1" stop-color="#46D5FF"/>
    </linearGradient>
    <filter id="pbGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pbGlowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path for trend line draw-on -->
    <clipPath id="lineReveal">
      <rect x="0" y="0" height="120" width="0">
        <animate attributeName="width" from="0" to="132" dur="1s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>
    <!-- Clip path for arrow reveal -->
    <clipPath id="arrowReveal">
      <rect x="100" y="0" height="30" width="0">
        <animate attributeName="width" from="0" to="32" dur="0.4s" begin="1.85s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    /* Bar grow-up animations */
    .pb-b0 { transform-origin: 20.5px 104px; transform: scaleY(0); animation: barUp 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards; }
    .pb-b1 { transform-origin: 45.5px 104px; transform: scaleY(0); animation: barUp 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.28s forwards; }
    .pb-b2 { transform-origin: 70.5px 104px; transform: scaleY(0); animation: barUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.46s forwards; }
    .pb-b3 { transform-origin: 95.5px 104px; transform: scaleY(0); animation: barUp 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.64s forwards; }

    @keyframes barUp {
      from { transform: scaleY(0); opacity: 0.3; }
      to   { transform: scaleY(1); opacity: 1; }
    }

    /* Nodes fade + scale in after line draws */
    .pb-node { opacity: 0; animation: nodePop 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .pb-n0 { animation-delay: 1.85s; }
    .pb-n1 { animation-delay: 1.95s; }
    .pb-n2 { animation-delay: 2.05s; }
    .pb-n3 { animation-delay: 2.15s; }

    @keyframes nodePop {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); 